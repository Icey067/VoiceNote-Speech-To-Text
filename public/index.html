<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="VoiceNote - Professional Speech-to-Text Note Taker powered by IBM Watson">
  <title>VoiceNote — Speech-to-Text Note Taker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --teal-50: #f0fdfa; --teal-100: #ccfbf1; --teal-200: #99f6e4;
      --teal-300: #5eead4; --teal-400: #2dd4bf; --teal-500: #14b8a6;
      --teal-600: #0d9488; --teal-700: #0f766e; --teal-800: #115e59;
      --bg: #f8fafb; --card-bg: #ffffff; --text: #1e293b;
      --text-secondary: #64748b; --border: #e2e8f0;
      --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
      --shadow-lg: 0 10px 25px rgba(0,0,0,.08);
      --radius: 16px;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; line-height: 1.6;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, var(--teal-700), var(--teal-500));
      padding: 2rem 1.5rem; text-align: center; color: #fff;
      position: relative; overflow: hidden;
    }
    header::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at 30% 50%, rgba(255,255,255,.12) 0%, transparent 60%);
    }
    header h1 { font-size: 1.75rem; font-weight: 700; letter-spacing: -.02em; position: relative; }
    header h1 span { opacity: .7; font-weight: 400; font-size: .85em; }
    header p { opacity: .85; font-size: .9rem; margin-top: .35rem; position: relative; }

    /* ── Main ── */
    main { max-width: 760px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

    /* ── Recorder Panel ── */
    .recorder-panel {
      background: var(--card-bg); border-radius: var(--radius);
      box-shadow: var(--shadow-lg); padding: 2.5rem 1.5rem;
      text-align: center; margin-bottom: 2.5rem;
    }

    .record-btn {
      width: 96px; height: 96px; border-radius: 50%; border: none;
      background: linear-gradient(135deg, var(--teal-500), var(--teal-600));
      color: #fff; cursor: pointer; font-size: 2.25rem;
      display: inline-flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(13,148,136,.35);
      transition: transform .2s, box-shadow .2s;
      position: relative;
    }
    .record-btn:hover { transform: scale(1.06); box-shadow: 0 6px 28px rgba(13,148,136,.45); }
    .record-btn:active { transform: scale(.97); }

    .record-btn.recording {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      box-shadow: 0 4px 20px rgba(239,68,68,.4);
      animation: pulse-ring 1.4s ease-in-out infinite;
    }

    @keyframes pulse-ring {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,.4); }
      50% { box-shadow: 0 0 0 14px rgba(239,68,68,0); }
    }

    .rec-label {
      display: block; margin-top: 1rem; font-size: .85rem;
      color: var(--text-secondary); font-weight: 500;
    }
    .timer {
      font-size: 1.5rem; font-weight: 600; font-variant-numeric: tabular-nums;
      color: var(--teal-700); margin-top: .4rem; display: none;
    }
    .timer.visible { display: block; }

    .status-msg {
      margin-top: 1rem; font-size: .82rem; color: var(--text-secondary);
      min-height: 1.2em;
    }
    .status-msg.error { color: #ef4444; }

    /* ── Notes ── */
    .notes-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 1rem;
    }
    .notes-header h2 { font-size: 1.15rem; font-weight: 600; }
    .note-count {
      font-size: .8rem; background: var(--teal-100); color: var(--teal-700);
      padding: .2rem .65rem; border-radius: 99px; font-weight: 600;
    }

    .empty-state {
      text-align: center; padding: 3rem 1rem; color: var(--text-secondary);
    }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: .5rem; }

    .note-card {
      background: var(--card-bg); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 1.35rem 1.5rem;
      margin-bottom: 1rem; border-left: 4px solid var(--teal-400);
      animation: slideUp .35s ease;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .note-meta {
      display: flex; gap: .75rem; flex-wrap: wrap; align-items: center;
      font-size: .75rem; color: var(--text-secondary); margin-bottom: .6rem;
    }
    .note-meta span { display: inline-flex; align-items: center; gap: .25rem; }

    .sentiment-badge {
      padding: .15rem .55rem; border-radius: 99px; font-weight: 600;
      font-size: .7rem; text-transform: uppercase; letter-spacing: .03em;
    }
    .sentiment-positive { background: #dcfce7; color: #166534; }
    .sentiment-neutral  { background: #f1f5f9; color: #475569; }
    .sentiment-negative { background: #fee2e2; color: #991b1b; }

    .note-text { font-size: .92rem; line-height: 1.65; margin-bottom: .75rem; }

    .keywords { display: flex; flex-wrap: wrap; gap: .4rem; }
    .kw-chip {
      background: var(--teal-50); color: var(--teal-700);
      font-size: .72rem; padding: .2rem .6rem; border-radius: 99px;
      font-weight: 500; border: 1px solid var(--teal-200);
    }

    .note-card .delete-btn {
      float: right; background: none; border: none; cursor: pointer;
      color: var(--text-secondary); font-size: .85rem; opacity: .5;
      transition: opacity .15s, color .15s;
    }
    .note-card .delete-btn:hover { opacity: 1; color: #ef4444; }

    /* ── Responsive ── */
    @media (max-width: 500px) {
      header h1 { font-size: 1.35rem; }
      .recorder-panel { padding: 2rem 1rem; }
      .record-btn { width: 80px; height: 80px; font-size: 1.9rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>🎙️ VoiceNote <span>| Speech-to-Text</span></h1>
  <p>Professional voice-powered note taking with IBM Watson AI</p>
</header>

<main>
  <!-- Recorder -->
  <section class="recorder-panel">
    <button class="record-btn" id="recordBtn" title="Click to record">🎤</button>
    <span class="rec-label" id="recLabel">Tap to start recording</span>
    <div class="timer" id="timer">00:00</div>
    <div class="status-msg" id="statusMsg"></div>
  </section>

  <!-- Notes list -->
  <section id="notesSection">
    <div class="notes-header">
      <h2>📋 Saved Notes</h2>
      <span class="note-count" id="noteCount">0</span>
    </div>
    <div id="notesList">
      <div class="empty-state" id="emptyState">
        <div class="icon">🗒️</div>
        <p>No notes yet. Record your first voice note above!</p>
      </div>
    </div>
  </section>
</main>

<script>
(() => {
  const recordBtn  = document.getElementById('recordBtn');
  const recLabel   = document.getElementById('recLabel');
  const timerEl    = document.getElementById('timer');
  const statusMsg  = document.getElementById('statusMsg');
  const notesList  = document.getElementById('notesList');
  const noteCount  = document.getElementById('noteCount');
  const emptyState = document.getElementById('emptyState');

  let mediaRecorder = null;
  let audioChunks   = [];
  let isRecording   = false;
  let timerInterval = null;
  let seconds       = 0;
  let notes         = JSON.parse(localStorage.getItem('voicenotes') || '[]');

  renderNotes();

  /* ── Recording ── */
  recordBtn.addEventListener('click', async () => {
    if (isRecording) { stopRecording(); return; }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioChunks = [];
      mediaRecorder = new MediaRecorder(stream, { mimeType: getSupportedMime() });
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.onstop = () => {
        stream.getTracks().forEach(t => t.stop());
        handleAudio(new Blob(audioChunks, { type: mediaRecorder.mimeType }));
      };
      mediaRecorder.start(250);
      isRecording = true;
      seconds = 0;
      recordBtn.classList.add('recording');
      recordBtn.textContent = '⏹';
      recLabel.textContent = 'Recording… tap to stop';
      timerEl.classList.add('visible');
      updateTimer();
      timerInterval = setInterval(updateTimer, 1000);
      setStatus('');
    } catch (err) {
      setStatus('Microphone access denied.', true);
    }
  });

  function stopRecording() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    isRecording = false;
    clearInterval(timerInterval);
    recordBtn.classList.remove('recording');
    recordBtn.textContent = '🎤';
    recLabel.textContent = 'Tap to start recording';
  }

  function getSupportedMime() {
    const types = ['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/ogg','audio/mp4'];
    return types.find(t => MediaRecorder.isTypeSupported(t)) || '';
  }

  function updateTimer() {
    seconds++;
    const m = String(Math.floor(seconds / 60)).padStart(2, '0');
    const s = String(seconds % 60).padStart(2, '0');
    timerEl.textContent = `${m}:${s}`;
  }

  /* ── Send to backend ── */
  async function handleAudio(blob) {
    const duration = seconds;
    setStatus('Transcribing…');
    timerEl.classList.remove('visible');

    const fd = new FormData();
    fd.append('audio', blob, 'recording.webm');

    try {
      const res = await fetch('/api/transcribe', { method: 'POST', body: fd });
      if (!res.ok) throw new Error('Server error');
      const data = await res.json();
      if (!data.success) throw new Error(data.error || 'Transcription failed');

      const transcription = data.transcription;
      setStatus('Analyzing…');

      // NLU analysis
      let analysis = { sentiment: { label: 'neutral' }, keywords: [], categories: [] };
      try {
        const nluRes = await fetch('/api/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: transcription })
        });
        if (nluRes.ok) {
          const nluData = await nluRes.json();
          if (nluData.success) analysis = nluData.analysis;
        }
      } catch (_) { /* NLU optional */ }

      const note = {
        id: Date.now(),
        text: transcription,
        duration,
        timestamp: new Date().toISOString(),
        sentiment: analysis.sentiment?.label || 'neutral',
        keywords: (analysis.keywords || []).slice(0, 8).map(k => k.text),
        demo: data.demo
      };

      notes.unshift(note);
      localStorage.setItem('voicenotes', JSON.stringify(notes));
      renderNotes();
      setStatus('✅ Note saved!');
      setTimeout(() => setStatus(''), 2500);

    } catch (err) {
      setStatus('❌ ' + err.message, true);
    }
  }

  /* ── Render ── */
  function renderNotes() {
    noteCount.textContent = notes.length;
    if (notes.length === 0) {
      emptyState.style.display = '';
      notesList.querySelectorAll('.note-card').forEach(c => c.remove());
      return;
    }
    emptyState.style.display = 'none';
    notesList.querySelectorAll('.note-card').forEach(c => c.remove());

    notes.forEach(n => {
      const card = document.createElement('div');
      card.className = 'note-card';

      const dur = `${String(Math.floor(n.duration/60)).padStart(2,'0')}:${String(n.duration%60).padStart(2,'0')}`;
      const time = new Date(n.timestamp).toLocaleString();
      const sentClass = n.sentiment === 'positive' ? 'sentiment-positive'
                      : n.sentiment === 'negative' ? 'sentiment-negative'
                      : 'sentiment-neutral';

      card.innerHTML = `
        <button class="delete-btn" data-id="${n.id}" title="Delete note">✕</button>
        <div class="note-meta">
          <span>🕐 ${time}</span>
          <span>⏱ ${dur}</span>
          <span class="sentiment-badge ${sentClass}">${n.sentiment}</span>
          ${n.demo ? '<span style="color:var(--teal-500);font-weight:600;">DEMO</span>' : ''}
        </div>
        <div class="note-text">${escapeHtml(n.text)}</div>
        ${n.keywords.length ? '<div class="keywords">' + n.keywords.map(k => `<span class="kw-chip">${escapeHtml(k)}</span>`).join('') + '</div>' : ''}
      `;
      notesList.appendChild(card);
    });

    notesList.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        notes = notes.filter(n => n.id !== Number(btn.dataset.id));
        localStorage.setItem('voicenotes', JSON.stringify(notes));
        renderNotes();
      });
    });
  }

  function setStatus(msg, isError) {
    statusMsg.textContent = msg;
    statusMsg.className = 'status-msg' + (isError ? ' error' : '');
  }

  function escapeHtml(str) {
    const d = document.createElement('div'); d.textContent = str; return d.innerHTML;
  }
})();
</script>
</body>
</html>
